<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>仅显示图片</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #ffffff; /* 可改成任意背景色 */
    }

    body {
      display: flex;
      justify-content: center; /* 水平居中 */
      align-items: center;     /* 垂直居中 */
    }

    img {
      max-width: 90%;
      max-height: 90vh;
    }
  </style>
</head>
<body>

  <img src="image.jpg" alt="示例图片">

</body>
</html>
