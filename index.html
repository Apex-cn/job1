声音很大，耳朵都快震聋了。","分组":"第57组·“听”相关","组号":57,"子分组":"声音大"},{"词":"穿云裂石","解释":"形容声音高亢嘹亮。","分组":"第57组·“听”相关","组号":57,"子分组":"声音大"},{"词":"佶屈聱牙","解释":"指文章读起来不顺口。","分组":"第57组·“听”相关","组号":57,"子分组":"形容文辞"},{"词":"入木三分","解释":"后也比喻看问题精辟、深刻。","分组":"第57组·“听”相关","组号":57,"子分组":"形容文辞"},{"词":"只言片语","解释":"简短零碎的话语、文字。形容语言文字数量极少。","分组":"第58组·“写”相关","组号":58,"子分组":"描写刻画、言简意赅"},{"词":"春秋笔法","解释":"即用笔曲折而意含褒贬的写作手法。","分组":"第58组·“写”相关","组号":58,"子分组":"描写刻画、言简意赅"},{"词":"皮里阳秋","解释":"意思是藏在心里不说出来的言论，表面上不直接发表评论，但实际上内心有着褒贬不同的看法。","分组":"第58组·“写”相关","组号":58,"子分组":"描写刻画、言简意赅"},{"词":"微言大义","解释":"意思是包含在精微语言里的深刻的道理。","分组":"第58组·“写”相关","组号":58,"子分组":"形容文章笔调"},{"词":"字斟句酌","解释":"用来形容人在写作或说话时的态度非常认真和细致，对于每一个字词和句子都会进行仔细地考虑和推敲。","分组":"第58组·“写”相关","组号":58,"子分组":"形容文章笔调"},{"词":"连篇累牍","解释":"形容篇幅过多，文词冗长。","分组":"第58组·“写”相关","组号":58,"子分组":"形容文章笔调"},{"词":"删繁就简","解释":"意思是去掉删除繁杂部分，使它趋于简明。","分组":"第58组·“写”相关","组号":58,"子分组":"形容表达流畅"},{"词":"一气呵成","解释":"形容文章的气势首尾贯通；形容完成整个工作的过程中不间断，不松懈。","分组":"第58组·“写”相关","组号":58,"子分组":"形容表达流畅"},{"词":"倚马可待","解释":"形容文思敏捷，文章写得快。","分组":"第58组·“写”相关","组号":58,"子分组":"形容表达流畅"},{"词":"一挥而就","解释":"指才思敏捷，写字、作文或画画速度很快。","分组":"第58组·“写”相关","组号":58,"子分组":"形容表达流畅"},{"词":"文不加点","解释":"形容文思敏捷，写作技巧高超。","分组":"第58组·“写”相关","组号":58,"子分组":"形容表达流畅"},{"词":"身无长物","解释":"除自身外再没有多余的东西。形容贫穷。","分组":"第59组·“钱”相关","组号":59,"子分组":"贫穷"},{"词":"一文不名","解释":"形容人非常穷困，一文钱都没有。","分组":"第59组·“钱”相关","组号":59,"子分组":"贫穷"},{"词":"一穷二白","解释":"比喻基础差，底子薄。","分组":"第59组·“钱”相关","组号":59,"子分组":"贫穷"},{"词":"积贫积弱","解释":"长期积累的贫困衰弱，形容极度的贫困和弱小。","分组":"第59组·“钱”相关","组号":59,"子分组":"贫穷"},{"词":"荜门圭窦","解释":"形容住室极其简陋。旧指穷人住处。","分组":"第59组·“钱”相关","组号":59,"子分组":"贫穷"},{"词":"桑枢瓮牖","解释":"用桑树做门轴，用瓦罐做窗户，比喻贫苦之家。","分组":"第59组·“钱”相关","组号":59,"子分组":"贫穷"},{"词":"肥马轻裘","解释":"骑肥壮的马，穿轻暖的皮衣。形容阔绰。","分组":"第59组·“钱”相关","组号":59,"子分组":"富有"},{"词":"钟鸣鼎食","解释":"击钟列鼎而食。形容贵族的豪华排场。","分组":"第59组·“钱”相关","组号":59,"子分组":"富有"},{"词":"养尊处优","解释":"指生活在有人伺候、条件优裕的环境中。","分组":"第59组·“钱”相关","组号":59,"子分组":"富有"},{"词":"随遇而安","解释":"处在任何环境中，都能安然自得，感到满足。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态好"},{"词":"安之若素","解释":"指身处逆境、遭到困难或遭受挫折时能泰然处之，跟平常一样。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态好"},{"词":"安贫乐道","解释":"安于贫穷，以坚持自己的信念为乐。旧时士大夫所主张的为人处世之道。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态好"},{"词":"泰然处之","解释":"形容毫不在意，沉着镇定。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态好"},{"词":"从容不迫","解释":"不慌不忙，沉着镇定。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态好"},{"词":"神色自若","解释":"外表神态自然，不显露紧张或慌乱，侧重于外在表情的平稳，不因外界影响而变化。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态好"},{"词":"无所适从","解释":"不知听从哪一个好。指不知该怎么办。（侧重面临选择）","分组":"第60组·“心态”相关","组号":60,"子分组":"心态慌、纠结"},{"词":"不知所措","解释":"不知道应该怎么办。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态慌、纠结"},{"词":"寝食难安","解释":"形容放心不下眼前的事，焦急到了极点，都到了睡也睡不着，吃也吃不好的地步了。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态慌、纠结"},{"词":"如坐针毡","解释":"像坐在插着针的毡子上。形容心神不定，坐立不安。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态慌、纠结"},{"词":"如芒在背","解释":"如同芒刺扎于背上，形容焦躁的心情。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态慌、纠结"},{"词":"杯弓蛇影","解释":"将映在酒杯里的弓影误认为蛇。比喻因疑神疑鬼而引起恐惧。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态慌、纠结"},{"词":"手足无措","解释":"手脚不知放到哪里才好。形容举止慌乱，或无法应对。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态慌、纠结"},{"词":"噤若寒蝉","解释":"闭口不作声。象深秋的蝉那样一声不吭。比喻因害怕有所顾虑而不敢说话。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态慌、纠结"},{"词":"谈虎色变","解释":"比喻一提起可怕的事情，脸色就变了。","分组":"第60组·“心态”相关","组号":60,"子分组":"心态慌、纠结"},{"词":"畏首畏尾","解释":"形容做事胆小，多所猜忌顾虑，畏缩不前。","分组":"第61组·顾虑、大胆","组号":61,"子分组":"有顾虑"},{"词":"投鼠忌器","解释":"比喻做事有顾忌，不敢放手干。","分组":"第61组·顾虑、大胆","组号":61,"子分组":"有顾虑"},{"词":"肆意妄为","解释":"指不顾一切由着自己的性子胡作非为。亦作“肆意妄行”。","分组":"第61组·顾虑、大胆","组号":61,"子分组":"毫无顾忌"},{"词":"肆无忌惮","解释":"非常放肆，毫无顾忌和畏惧。","分组":"第61组·顾虑、大胆","组号":61,"子分组":"毫无顾忌"},{"词":"刨根问底","解释":"追究底细。","分组":"第62组·调查相关","组号":62,"子分组":"追寻真相"},{"词":"顺藤摸瓜","解释":"比喻按照某个线索查究事情。","分组":"第62组·调查相关","组号":62,"子分组":"追寻真相"},{"词":"按图索骥","解释":"比喻做事死守教条，而不懂得变通。也比喻依据一定的线索去寻找事物。（中性词）","分组":"第62组·调查相关","组号":62,"子分组":"追寻真相"},{"词":"捕风捉影","解释":"比喻说话或做事时用似是而非的迹象做根据。","分组":"第62组·调查相关","组号":62,"子分组":"追寻真相"},{"词":"妄自菲薄","解释":"毫无根据地小看自己。形容自轻自贱。","分组":"第62组·调查相关","组号":62,"子分组":"形容自卑"},{"词":"自惭形秽","解释":"指因不如别人而感到惭愧。也泛指自己觉得不如别人而感到惭愧。","分组":"第62组·调查相关","组号":62,"子分组":"形容自卑"},{"词":"自怨自艾","解释":"原指悔恨并且改正自己的错误，现多指悔恨自己的错误。","分组":"第62组·调查相关","组号":62,"子分组":"形容自卑"},{"词":"怨天尤人","解释":"指遇到挫折、麻烦时一味抱怨命运和责怪别人。","分组":"第62组·调查相关","组号":62,"子分组":"形容自卑"},{"词":"盛气凌人","解释":"指以骄横的气势欺负人。","分组":"第62组·调查相关","组号":62,"子分组":"形容自负"},{"词":"弹冠相庆","解释":"指即将做官而互相庆贺，多用于贬义。","分组":"第63组·其他特殊成语","组号":63},{"词":"优胜劣汰","解释":"指生物在生存竞争中适应力强的保存下来，适应力差的被淘汰。","分组":"第63组·其他特殊成语","组号":63},{"词":"弱肉强食","解释":"弱者的肉是强者的食物。比喻弱者被强者所欺凌、吞并等。","分组":"第63组·其他特殊成语","组号":63},{"词":"粉墨登场","解释":"化好妆登台演戏。也比喻登上政治舞台，含讥讽义。","分组":"第63组·其他特殊成语","组号":63},{"词":"百家齐放","解释":"比喻艺术上不同的形式和风格自由发展。","分组":"第63组·其他特殊成语","组号":63},{"词":"骇人听闻","解释":"使人听了非常吃惊、害怕。","分组":"第63组·其他特殊成语","组号":63},{"词":"耸人听闻","解释":"指故意夸大或捏造事实，使人听后感到震惊。","分组":"第63组·其他特殊成语","组号":63},{"词":"不刊之论","解释":"不可改动或不可磨灭的言论。","分组":"第63组·其他特殊成语","组号":63},{"词":"不易之论","解释":"内容正确、不可更改的言论。","分组":"第63组·其他特殊成语","组号":63},{"词":"朝乾夕惕","解释":"一天到晚勤奋谨慎，没有一点疏忽懈怠。","分组":"第63组·其他特殊成语","组号":63},{"词":"夕惕若厉","解释":"朝夕戒惧，如临危境，不敢稍懈。","分组":"第63组·其他特殊成语","组号":63},{"词":"曲高和寡","解释":"比喻思想、言行、文艺作品等高深，不能为多数人所理解接受。","分组":"第63组·其他特殊成语","组号":63},{"词":"阳春白雪","解释":"比喻高深的、不通俗的文学艺术。","分组":"第63组·其他特殊成语","组号":63},{"词":"厉兵秣马","解释":"准备战斗。","分组":"第63组·其他特殊成语","组号":63},{"词":"不容置喙","解释":"不容许插嘴。","分组":"第63组·其他特殊成语","组号":63},{"词":"不容置疑","解释":"不允许加以怀疑。指绝对真实可信。","分组":"第63组·其他特殊成语","组号":63},{"词":"移花接木","解释":"比喻暗中用手段更换人或事物来欺骗别人。","分组":"第63组·其他特殊成语","组号":63},{"词":"偷梁换柱","解释":"比喻暗中耍手段改变事物内容，以假代真，以劣代优。","分组":"第63组·其他特殊成语","组号":63},{"词":"李代桃僵","解释":"比喻兄弟相爱相助，患难与共。也比喻以此代彼（多贬义）或代人受过。","分组":"第63组·其他特殊成语","组号":63},{"词":"张冠李戴","解释":"把姓张的帽子戴到姓李的头上。比喻认错了对象，弄错了事实。（主观上故意或者不故意）","分组":"第63组·其他特殊成语","组号":63},{"词":"渊渟岳峙","解释":"比喻人品德如渊水深沉，如高山耸立。","分组":"第63组·其他特殊成语","组号":63},{"词":"不分畛域","解释":"不分界限、范围。也比喻不分彼此。","分组":"第64组·生僻成语","组号":64},{"词":"毛举细故","解释":"指烦琐地列举小事情，加以责难或攻击。","分组":"第64组·生僻成语","组号":64},{"词":"吉光片羽","解释":"比喻残存的珍贵文物。","分组":"第64组·生僻成语","组号":64},{"词":"钟灵毓秀","解释":"凝聚了天地间的灵气，孕育着优秀的人物。指山川秀美，人才辈出。","分组":"第64组·生僻成语","组号":64},{"词":"瑕瑜互见","解释":"比喻优点、缺点都有。","分组":"第64组·生僻成语","组号":64},{"词":"沉思翰藻","解释":"构思深刻，辞藻华丽。","分组":"第64组·生僻成语","组号":64}],"实词":[{"词":"镌刻","解释":"强调用工具在坚硬物体上精细雕刻，侧重“雕刻”的动作本身，多用于艺术创作、碑文等正式场景。","分组":"第1组·“雕刻”和“绘画”相关动作","组号":1,"子分组":"雕刻（具象与抽象分化）"},{"词":"铭记","解释":"如将情感、记忆深深记在心中。","分组":"第1组·“雕刻”和“绘画”相关动作","组号":1,"子分组":"雕刻（具象与抽象分化）"},{"词":"描绘","解释":"强调画出，描画，描述。","分组":"第1组·“雕刻”和“绘画”相关动作","组号":1,"子分组":"绘画、文字相关"},{"词":"刻画","解释":"本义指通过雕刻和绘画等艺术手段在物体上创造出图案或形象。通常用来形容通过文字、绘画或其他艺术形式塑造人物、场景、情感等。","分组":"第1组·“雕刻”和“绘画”相关动作","组号":1,"子分组":"绘画、文字相关"},{"词":"擘画","解释":"指对事物进行规划、设计和安排，常用于形容对重大事务的宏观布局和细致规划，对事情有深远的考虑和计划，含有策略性和智慧性的意味。","分组":"第1组·“雕刻”和“绘画”相关动作","组号":1,"子分组":"绘画、文字相关"},{"词":"描摹","解释":"本义指通过透明纸覆盖在原件上，按照可见的线条或文字进行复制，如描摹图画、版画或手抄本。在文学创作中，描摹指通过文字细腻地描绘人物、场景、情感等，使读者能够形象地感受到所描述的内容。这种技巧强调对细节的捕捉和生动的表达，以增强作品的表现力和感染力。","分组":"第1组·“雕刻”和“绘画”相关动作","组号":1,"子分组":"绘画、文字相关"},{"词":"勾勒","解释":"指用线条画出轮廓，也表示用简单的笔墨描写事物的大致情况。","分组":"第1组·“雕刻”和“绘画”相关动作","组号":1,"子分组":"绘画、文字相关"},{"词":"凝结","解释":"原指液体遇冷变成固体（如“水汽凝结成冰”），引申为抽象事物通过过程逐渐固定、形成。","分组":"第2组·集中到一起","组号":2},{"词":"凝固","解释":"原指在温度降低时，物质由液态变为固态的过程，引申为形容事物因某种原因（如情绪、氛围等）变得固定、停滞或不再变化，多用来描述氛围、表情、时间感等。","分组":"第2组·集中到一起","组号":2},{"词":"汇聚","解释":"侧重指像水流一样从多个方向集中到一处，强调动态的“汇合过程”，对象多为水流、人群、力量等，带有较强的方向性和流动性。","分组":"第2组·集中到一起","组号":2},{"词":"汇集","解释":"更侧重把分散的事物收集、整合到一起，强调“集中的结果”，适用范围较广。","分组":"第2组·集中到一起","组号":2},{"词":"聚集","解释":"强调“从各处集合到某一地点”，侧重空间上的集中，对象可以是人和物。","分组":"第2组·集中到一起","组号":2},{"词":"承载","解释":"支撑，托着物体，承受它的重量，也指某种事物（如文化、情感、信息等）所承担、包含的内涵。","分组":"第3组·表明两者关系","组号":3,"子分组":"传递承担某物"},{"词":"载体","解释":"指某些能传递能量或承载其他物质的物质。现也泛指一切能够承载其他事物的事物。","分组":"第3组·表明两者关系","组号":3,"子分组":"传递承担某物"},{"词":"延伸","解释":"指在原有基础上延长、扩展或发展。","分组":"第3组·表明两者关系","组号":3,"子分组":"传递承担某物"},{"词":"代表","解释":"直接指代或替代某一事物，强调明确的对应关系；通常用于具体事物或概念的指代。","分组":"第3组·表明两者关系","组号":3,"子分组":"传递承担某物"},{"词":"象征","解释":"用具体事物表现某些抽象意义。","分组":"第3组·表明两者关系","组号":3,"子分组":"传递承担某物"},{"词":"标志","解释":"显示出来的现象；表现出来的特征。","分组":"第3组·表明两者关系","组号":3,"子分组":"传递承担某物"},{"词":"反映","解释":"本义把情况或意见等向上级转达、报告，比喻把客观事物的实质和表现或显示出来。","分组":"第3组·表明两者关系","组号":3,"子分组":"表现客观情况或结果"},{"词":"印证","解释":"证明与事实相符。","分组":"第3组·表明两者关系","组号":3,"子分组":"表现客观情况或结果"},{"词":"桥梁","解释":"指跨越障碍物（如河流、山谷、道路等）的建筑物，用于连接两地，使交通畅通；比喻连接事物、情感、关系的媒介。","分组":"第3组·表明两者关系","组号":3,"子分组":"表现客观情况或结果"},{"词":"枢纽","解释":"指主门户开合之框与提系器物之纽。引申义比喻事物中起决定性作用的部分。","分组":"第3组·表明两者关系","组号":3,"子分组":"表现客观情况或结果"},{"词":"纽带","解释":"指用于捆束或连接物品的带子，如绳索、系带等。引申义比喻能够维系人或事物的关系或因素，强调其连接、团结的作用。","分组":"第3组·表明两者关系","组号":3,"子分组":"表现客观情况或结果"},{"词":"映照","解释":"侧重客观呈现物体的影像或状态，常用于自然现象或具体场景。","分组":"第3组·表明两者关系","组号":3,"子分组":"对外界的反映"},{"词":"折射","解释":"原指光线从一种介质进入另一种介质时，因速度变化而改变传播方向，导致影像变形，侧重物理现象或抽象层面的“间接反映”（如通过现象看本质）。","分组":"第3组·表明两者关系","组号":3,"子分组":"对外界的反映"},{"词":"映射","解释":"原指数学中元素与元素的对应关系，引申为“通过某种方式将一事物的特征投射到另一事物上”。","分组":"第3组·表明两者关系","组号":3,"子分组":"对外界的反映"},{"词":"投射","解释":"指光线、影子等直接投向物体，或心理学术语中“将自身特质归因于他人”的心理机制，强调“主动投向”的动作。","分组":"第3组·表明两者关系","组号":3,"子分组":"对外界的反映"},{"词":"诠释","解释":"说明，解释，多用于书面。","分组":"第4组·解释、显示、氛围","组号":4,"子分组":"解释"},{"词":"阐释","解释":"阐述并解释。","分组":"第4组·解释、显示、氛围","组号":4,"子分组":"解释"},{"词":"彰显","解释":"显赫，明显，显著，鲜明地显示。","分组":"第4组·解释、显示、氛围","组号":4,"子分组":"显示出来"},{"词":"凸显","解释":"本义是凸出显露。","分组":"第4组·解释、显示、氛围","组号":4,"子分组":"显示出来"},{"词":"渲染","解释":"原意是国画的一种画法，用水墨或淡的色彩涂抹画面，以加强艺术效果，多用来突出气氛或情感。","分组":"第4组·解释、显示、氛围","组号":4,"子分组":"氛围、环境的形容词"},{"词":"烘托","解释":"原意是国画的一种画法，用水墨或淡的色彩点染轮廓外部，使物象鲜明，多用来比喻夸大的形容或者对事物突出的描写和烘托。","分组":"第4组·解释、显示、氛围","组号":4,"子分组":"氛围、环境的形容词"},{"词":"交融","解释":"强调不同事物相互渗透形成新整体。","分组":"第5组·融合、进入","组号":5},{"词":"融合","解释":"指不同元素结合后失去原有界限，形成统一体。","分组":"第5组·融合、进入","组号":5},{"词":"融入","解释":"侧重一方主动适应或加入另一体系。","分组":"第5组·融合、进入","组号":5},{"词":"介入","解释":"指外部力量主动干预或参与。","分组":"第5组·融合、进入","组号":5},{"词":"渗透","解释":"本义为液体缓慢透入。现多比喻事物或势力逐渐进入，或军队利用敌部署的间隙或有利地形秘密渗入敌纵深或后方的作战行动的军事术语。","分组":"第5组·融合、进入","组号":5},{"词":"渗入","解释":"指液体慢慢地透过孔隙或缝隙进入另一种物质内部。例如，雨水渗入土壤、墨水渗入纸张等，也表示某种思想、文化、影响等逐渐进入或渗透到某个领域或群体中。","分组":"第5组·融合、进入","组号":5},{"词":"裹挟","解释":"本义是指（风、流水等）把别的东西卷入，使随着移动。现比喻（形势、潮流等）把人卷进去，迫使采取某种态度或行动。","分组":"第5组·融合、进入","组号":5},{"词":"积淀","解释":"侧重指长期积累后形成的文化、经验、传统等抽象事物，强调过程的漫长性和结果的厚重感，多用于精神层面。","分组":"第6组·表示积累的过程或结果","组号":6},{"词":"沉淀","解释":"原指液体中杂质下沉或溶液中溶质析出（如“泥沙沉淀”），引申为思想、情感等抽象事物在经历后慢慢凝结、稳定，侧重自然积累或筛选的过程。","分组":"第6组·表示积累的过程或结果","组号":6},{"词":"积累","解释":"指通过不断收集、聚集具体或抽象的事物，侧重数量的增加，使用范围更广泛。","分组":"第6组·表示积累的过程或结果","组号":6},{"词":"浸润","解释":"指液体慢渗入固体物质中的自然过程。引申义指的是思想和文化的熏陶、渗透。","分组":"第7组·供给养分或产生影响","组号":7},{"词":"滋润","解释":"1.形容湿润、不干燥状态，指物体含有适量水分，舒适饱满的状态。2.补充水分，使不干燥。3.形容生活舒适、富足，形容生活宽裕、惬意、手里钱财宽裕。","分组":"第7组·供给养分或产生影响","组号":7},{"词":"滋生","解释":"指生物（多指微生物或有害生物）产生、繁殖的过程。引申义指的是引发不良现象，导致负面事物产生或蔓延。","分组":"第7组·供给养分或产生影响","组号":7},{"词":"涵养","解释":"表示内在修养，也指道德、学问等方面的修养。","分组":"第7组·供给养分或产生影响","组号":7},{"词":"滋养","解释":"提供养分，促进生长，指通过物质或精神养料使生物或事物健康成长。其次指维持生命活力，强调持续供给生存所需的根本养分。","分组":"第7组·供给养分或产生影响","组号":7},{"词":"侵蚀","解释":"指逐渐侵害使变坏，多指从外部对物体进行侵害，通常包含“由外及里”的过程，程度稍轻。","分组":"第8组·环境作用下促进成长或发展","组号":8},{"词":"腐蚀","解释":"更严重的变质或破坏。引申为人在坏的思想、行为、环境等因素影响下逐渐变质堕落；多用于比喻人的思想或行为的变质；这通常是一个“由里及外”的过程，可能表示。","分组":"第8组·环境作用下促进成长或发展","组号":8},{"词":"培育","解释":"本意为培养幼小的生物，使它发育成长，常用于人才、经济、精神等成长。","分组":"第8组·环境作用下促进成长或发展","组号":8},{"词":"激发","解释":"指给予刺激使其奋发出原有的潜力。","分组":"第8组·环境作用下促进成长或发展","组号":8},{"词":"激励","解释":"指通过刺激和正面鼓励使其奋发，通常侧重需要鼓励。","分组":"第8组·环境作用下促进成长或发展","组号":8},{"词":"引领","解释":"引导；带领，侧重在前带头开路。","分组":"第8组·环境作用下促进成长或发展","组号":8},{"词":"推动","解释":"通过提供动力或创造条件促使事物发展，对象可以是具体行动（如政策实施）或抽象概念（如科技创新）。","分组":"第8组·环境作用下促进成长或发展","组号":8},{"词":"引导","解释":"本义是指通过行为帮人走出困境，或是带着人向某个目标集体行动，通过行为帮人走出困境。侧重从旁指点路径。","分组":"第8组·环境作用下促进成长或发展","组号":8},{"词":"发扬","解释":"主要表示发展、推广、提升某种事物，使其更加显著、壮大或广泛传播。","分组":"第8组·环境作用下促进成长或发展","组号":8},{"词":"弘扬","解释":"意思是广泛宣传、发扬光大，通常用于精神、文化、思想等抽象事物的传播与推广。","分组":"第8组·环境作用下促进成长或发展","组号":8},{"词":"贯穿","解释":"强调事物在空间或逻辑上的连通性，既可指具体事物穿过或连接空间（如铁路贯穿全国），也可指逻辑或时间维度的持续关联（如主题贯穿始终）。","分组":"第9组·穿透或联通、改造","组号":9},{"词":"贯通","解释":"更侧重对事物的全面掌握或深层连接；既包含透彻理解，表示对知识体系的全盘掌握（如贯通中西文化），也可指复杂结构的整体连通（如工程贯通多个节点）。","分组":"第9组·穿透或联通、改造","组号":9},{"词":"转型","解释":"侧重指在原有基础上进行改造、更新，使形态、结构或形象发生根本性变化，强调“从旧到新的转型”。","分组":"第9组·穿透或联通、改造","组号":9},{"词":"重构","解释":"侧重指对事物的结构、框架或系统进行根本性的调整或重新设计，强调从底层逻辑或组织形式上优化，常用于技术、理论、流程等理性场景。","分组":"第9组·穿透或联通、改造","组号":9},{"词":"演进","解释":"指逐渐地进化，强调的是事物在长久发展变化中向好的方向推进；常用于描述科技、文化、社会制度等方面在长时间内逐渐进步、完善的过程。","分组":"第10组·事物变化","组号":10},{"词":"演变","解释":"指的是历时较久的发展变化，侧重于描述事物在时间推移中发生的变化；适用于描述各种事物在长时间内发生的变化，无论这种变化是积极的还是消极的。","分组":"第10组·事物变化","组号":10},{"词":"演绎","解释":"在逻辑学和数学领域指一种从一般到特殊的推理方法，即从普遍认可的前提中必然推出结论。在表演和文化领域指演员或艺术家对角色、作品的诠释和表现；更强调“推理性”或“表现性”，而非“变化性”。","分组":"第10组·事物变化","组号":10},{"词":"进化","解释":"指生物或事物由简单到复杂、由低级到高级逐渐发展变化的过程，强调向更高级、更优化的方向变化。","分组":"第10组·事物变化","组号":10},{"词":"转化","解释":"指事物性质、形态、功能或归属发生改变的过程，强调从一种状态转变为另一种状态。广泛适用于自然科学、社会科学及日常生活。","分组":"第10组·事物变化","组号":10},{"词":"蜕变","解释":"原指蝉蜕壳变，后比喻形质的改变、转化；用于形容彻底而剧烈的质变。","分组":"第10组·事物变化","组号":10},{"词":"嬗变","解释":"指事物逐渐演变、更替，尤其强调新旧交替、传承与变化的过程。","分组":"第10组·事物变化","组号":10},{"词":"催生","解释":"指通过外部力量促使新事物产生或加速发展，强调人为干预或客观条件推动。","分组":"第11组·事物产生、发展","组号":11},{"词":"催化","解释":"指通过催化剂改变化学反应速率（加快或减慢）而自身不被消耗的过程，引申为促进事物发展的辅助因素。","分组":"第11组·事物产生、发展","组号":11},{"词":"囊括","解释":"强调全部包含，要求无遗漏；多用于竞赛、全集等需绝对完整的语境。","分组":"第12组·包含、蕴含","组号":12},{"词":"涵盖","解释":"侧重范围覆盖，允许部分缺失；常见于学术、展览等描述广泛领域的场景。","分组":"第12组·包含、蕴含","组号":12},{"词":"蕴含","解释":"指事物内在包含某种情感、深意等（抽象内容）。","分组":"第12组·包含、蕴含","组号":12},{"词":"包蕴","解释":"包含、蕴藏（抽象内容）；书面语色彩较强，侧重整体包含复杂内容。","分组":"第12组·包含、蕴含","组号":12},{"词":"意蕴","解释":"指事物内在的含义或情调；强调抽象的美感或深层意义，常用于艺术、文学领域。","分组":"第12组·包含、蕴含","组号":12},{"词":"泥潭","解释":"本义指湿软的沼泽地，比喻难以摆脱的困境或复杂局面；强调陷入后难以脱身，带有被动性和挣扎感；常用于形容在困境中挣扎。","分组":"第13组·困境、阻碍","组号":13},{"词":"藩篱","解释":"比喻限制、束缚的屏障或需要突破的障碍；常用于跨越界限的场景。","分组":"第13组·困境、阻碍","组号":13},{"词":"羁绊","解释":"侧重指因情感、关系或责任产生的牵连，既有牵挂的温暖感，也可能带来束缚。","分组":"第13组·困境、阻碍","组号":13},{"词":"束缚","解释":"强调用强制手段限制自由，带有明显的负面色彩，侧重外界的压迫或规则约束。","分组":"第13组·困境、阻碍","组号":13},{"词":"妨碍","解释":"侧重指干扰、阻碍，使事情不能顺利进行，对象可以是具体行为或抽象事物。","分组":"第13组·困境、阻碍","组号":13},{"词":"阻滞","解释":"强调因阻碍而使进程变慢甚至停滞，侧重动作的持续性和阻碍的强度，用于水流、交通、进程等。","分组":"第13组·困境、阻碍","组号":13},{"词":"制约","解释":"一事物的存在、变化是另一事物存在、变化的先决条件，则前者制约后者。","分组":"第13组·困境、阻碍","组号":13},{"词":"徜徉","解释":"闲游、安闲自在地步行。","分组":"第14组·移动、徘徊","组号":14},{"词":"徘徊","解释":"表示在一个地方来回走动，或比喻犹豫不决，也比喻事物在某个范围内来回浮动、起伏。","分组":"第14组·移动、徘徊","组号":14},{"词":"蔓延","解释":"如蔓草滋生，连绵不断。引申为延伸，扩展。","分组":"第14组·移动、徘徊","组号":14},{"词":"秉持","解释":"强调个体或集体在行动中所坚守的原则或持有的态度。更侧重于“持有”的意味，适用于各种语境。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"契合","解释":"指十分符合，也可用于表示意气相投。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"观照","解释":"原为佛教语，指静观世界以智慧照见事理；现多指仔细观察，审视。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"审视","解释":"指仔细地看，含一定的思考意味。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"沿袭","解释":"依照旧传统或原有规定办事。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"滥觞","解释":"原指江河发源处。现比喻事物的开始或起源；在某些文献中，“滥觞”还有泛滥、过分的意思，用于描述某事过度发展或超出限度。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"孕育","解释":"本义指对生命或事物的养育和滋养，使其得以成长和发展。多用于比喻既存的事物中酝酿着新事物，如思想、文化、艺术作品等的形成和发展。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"式微","解释":"指事物由兴盛而衰落，强调渐进性的衰落过程。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"升华","解释":"一指固态物质不经液态直接变为气态，二指比喻事物的提高和精炼。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"支撑","解释":"指让物体不倒塌，让事物发展不失败、不崩溃，用于积极的语境。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"塑造","解释":"指用语言文字等艺术手段描写形象，或对原材料或已有的事物进行改造或加工，使其呈现出新的形态或特征；亦指用石膏、黏土等做成人或物的形象。用于积极的语境。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"媲美","解释":"指美好的程度可以相比，类似比美之意。一般都用于一种东西可以和另一种东西相比。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"凝视","解释":"指聚精会神地观看，不眨眼睛，神情专注。适用多种语境，后面可接抽象和具体名词。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"引擎","解释":"本义指把（如热能、化学能、核能、辐射能和升高的水的势能等形式的）能量转变为机械力和运动的机器。现在常引申为推动事物发展的动力。一般用于积极语境。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"},{"词":"审慎","解释":"指周密谨慎、细致稳重，强调在决策、行动前要权衡利弊，妥善行动。","分组":"第15组·其他词语","组号":15,"子分组":"需要积累的其他词语"}]}
</script>
<script>
// 禁止手势缩放
document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
document.addEventListener('gestureend', function(e) { e.preventDefault(); });

// ==================== 导航切换 ====================
let currentSection = 'baifen';
document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        let sec = btn.dataset.section;
        currentSection = sec;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('section-' + sec).classList.add('active');
    });
});

// ==================== 悬浮窗口 ====================
let resultTimer = null;
function showResultWindow(status, title, msg, userAns, correctAns, autoMs) {
    if (resultTimer) clearTimeout(resultTimer);
    let overlay = document.getElementById('resultOverlay');
    let win = document.getElementById('resultWindow');
    win.className = 'result-window ' + status;
    document.getElementById('resultIcon').innerText = {success:'✅',error:'❌',warn:'⚠️',info:'ℹ️'}[status]||'ℹ️';
    document.getElementById('resultTitle').innerText = title;
    document.getElementById('resultMsg').innerText = msg || '';
    let box = document.getElementById('resultAnswerBox');
    if (userAns || correctAns) {
        box.style.display = 'block';
        let uc = status === 'error' ? 'ans-val user' : 'ans-val';
        let cc = status === 'error' ? 'ans-val correct-ans' : 'ans-val';
        box.innerHTML = `
            <div class="ans-row"><span class="ans-label">你的答案</span><span class="${uc}">${userAns||'（未输入）'}</span></div>
            <div class="ans-row"><span class="ans-label">正确答案</span><span class="${cc}">${correctAns||''}</span></div>`;
    } else { box.style.display = 'none'; }
    overlay.style.display = 'flex';
    let delay = autoMs || (status === 'success' ? 700 : 1300);
    resultTimer = setTimeout(() => { overlay.style.display = 'none'; }, delay);
}
function closeResultWindow() {
    if (resultTimer) clearTimeout(resultTimer);
    document.getElementById('resultOverlay').style.display = 'none';
}
document.getElementById('resultOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeResultWindow();
});
document.getElementById('resultOverlay').addEventListener('touchmove', function(e) { e.preventDefault(); }, {passive: false});

// ==================== 礼花特效 ====================
function fireConfetti() {
    let canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99999;';
    document.body.appendChild(canvas);
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let ctx = canvas.getContext('2d');
    let colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#845ef7','#ff6eb4','#00c9a7'];
    let particles = [];
    for (let i = 0; i < 100; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height * 0.3 - canvas.height * 0.1,
            vx: (Math.random() - 0.5) * 12, vy: Math.random() * 6 + 2,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: Math.random() * 8 + 4, rot: Math.random() * 360,
            rotV: (Math.random() - 0.5) * 15, opacity: 1
        });
    }
    let start = performance.now();
    function frame(now) {
        let elapsed = now - start;
        if (elapsed > 1400) { canvas.remove(); return; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let p of particles) {
            p.x += p.vx; p.vy += 0.12; p.y += p.vy; p.rot += p.rotV;
            if (elapsed > 900) p.opacity = Math.max(0, 1 - (elapsed - 900) / 500);
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
            ctx.globalAlpha = p.opacity; ctx.fillStyle = p.color;
            ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
            ctx.restore();
        }
        requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
}

// ==================== 百化分模块 ====================
(function() {
    const RAW_DATA = {"百化分数据":[
        {"分数":"1/40","百分数":"2.5%","分组":"谁都会"},{"分数":"1/30","百分数":"3.3%","分组":"谁都会"},{"分数":"1/20","百分数":"5%","分组":"谁都会"},{"分数":"1/19","百分数":"5.3%","分组":"等差数列"},{"分数":"1/18","百分数":"5.6%","分组":"等差数列"},{"分数":"1/17","百分数":"5.9%","分组":"等差数列"},{"分数":"1/16.5","百分数":"6%","分组":"母子互换"},{"分数":"1/16","百分数":"6.25%","分组":"母子互换"},{"分数":"1/15.5","百分数":"6.5%","分组":"母子互换"},{"分数":"1/15","百分数":"6.7%","分组":"母子互换"},{"分数":"1/14.5","百分数":"6.9%","分组":"母子互换"},{"分数":"1/14","百分数":"7.1%","分组":"母子互换"},{"分数":"1/13.5","百分数":"7.4%","分组":"母子互换"},{"分数":"1/13","百分数":"7.7%","分组":"加和20"},{"分数":"1/12.5","百分数":"8%","分组":"加和20"},{"分数":"1/12","百分数":"8.3%","分组":"加和20"},{"分数":"1/11","百分数":"9.1%","分组":"加和20"},{"分数":"1/10.5","百分数":"9.5%","分组":"加和20"},{"分数":"1/10","百分数":"10%","分组":"加和20"},{"分数":"1/9.5","百分数":"10.5%","分组":"加和20"},{"分数":"1/9","百分数":"11.1%","分组":"加和20"},{"分数":"1/8.5","百分数":"11.8%","分组":"加和20"},{"分数":"1/8","百分数":"12.5%","分组":"加和20"},{"分数":"1/7.7","百分数":"13%","分组":"加和20"},{"分数":"1/7.5","百分数":"13.3%","分组":"加和20"},{"分数":"1/7","百分数":"14.3%","分组":"母子互换"},{"分数":"1/6.7","百分数":"15%","分组":"母子互换"},{"分数":"1/6.5","百分数":"15.4%","分组":"母子互换"},{"分数":"1/6","百分数":"16.7%","分组":"母子互换"},{"分数":"1/5.9","百分数":"17%","分组":"等差数列"},{"分数":"1/5.6","百分数":"18%","分组":"等差数列"},{"分数":"1/5.5","百分数":"18.2%","分组":"等差数列"},{"分数":"1/5.3","百分数":"19%","分组":"等差数列"},{"分数":"1/5","百分数":"20%","分组":"谁都会"},{"分数":"1/4.5","百分数":"22.2%","分组":"谁都会"},{"分数":"1/4","百分数":"25%","分组":"谁都会"},{"分数":"1/3.5","百分数":"28.6%","分组":"谁都会"},{"分数":"1/3","百分数":"33.3%","分组":"谁都会"}
    ]};
    const questions = RAW_DATA["百化分数据"];
    const TOTAL_QS = questions.length;

    function normalizePercent(pStr) {
        let s = pStr.trim().toLowerCase();
        if (!s.endsWith('%')) return null;
        let num = parseFloat(s.slice(0, -1));
        return isNaN(num) ? null : num;
    }
    function parseUserInput(raw) {
        let v = raw.trim();
        if (v === "") return null;
        let withPercent = v.endsWith('%') ? v : v + '%';
        return normalizePercent(withPercent);
    }
    function isAnswerCorrectWithTolerance(userRaw, correctPercentStr) {
        let userNum = parseUserInput(userRaw);
        let correctNum = normalizePercent(correctPercentStr);
        if (userNum === null || correctNum === null) return false;
        return Math.abs(userNum - correctNum) <= 0.02;
    }
    function parseFractionToDecimal(fracStr) {
        let parts = fracStr.trim().split('/');
        if (parts.length !== 2) return null;
        let num = parseFloat(parts[0]), den = parseFloat(parts[1]);
        if (isNaN(num) || isNaN(den) || den === 0) return null;
        return num / den;
    }
    function checkFractionAnswer(userFrac, correctPercentStr) {
        let userDec = parseFractionToDecimal(userFrac);
        let correctNum = normalizePercent(correctPercentStr);
        if (userDec === null || correctNum === null) return false;
        return Math.abs(userDec - correctNum / 100) <= 0.001;
    }

    let currentQuestion = null, currentQuestionType = 'f2p';
    let answeredForCurrent = false, currentLock = false;
    let stats = { totalAttempts: 0, correctCount: 0 };
    let currentInputStr = "";

    const qEl = document.getElementById('bfQuestion'), hintEl = document.getElementById('bfHint');
    const inputEl = document.getElementById('bfInput'), metaEl = document.getElementById('bfMeta');
    const totalEl = document.getElementById('bfTotal'), correctEl = document.getElementById('bfCorrect'), accEl = document.getElementById('bfAcc');
    const flipContainer = document.getElementById('flipContainer');
    const tableBody = document.getElementById('bfTableBody');
    const backTotalEl = document.getElementById('bfBackTotal');

    function updateStatsUI() {
        totalEl.innerText = stats.totalAttempts;
        correctEl.innerText = stats.correctCount;
        let acc = stats.totalAttempts === 0 ? 0 : (stats.correctCount / stats.totalAttempts * 100);
        accEl.innerText = Math.round(acc);
    }
    function saveStats() { localStorage.setItem('bf_stats', JSON.stringify(stats)); }
    function loadStats() {
        let saved = localStorage.getItem('bf_stats');
        if (saved) { try { let p = JSON.parse(saved); if (typeof p.totalAttempts === 'number') stats = p; } catch(e) {} }
        updateStatsUI();
    }
    function resetStats() {
        if (!confirm('确定要重置百化分统计吗？')) return;
        stats.totalAttempts = 0; stats.correctCount = 0; updateStatsUI(); saveStats();
    }

    function updateInputDisplay() {
        if (currentInputStr === "") { inputEl.innerText = "0"; inputEl.style.color = "#94a3b8"; }
        else { inputEl.innerText = currentInputStr; inputEl.style.color = "#0f172a"; }
    }
    function appendToInput(value) {
        if (value === '%') {
            if (currentInputStr.includes('%')) return;
            if (currentInputStr === "") currentInputStr = "0";
            currentInputStr += '%';
        } else if (value === '/') {
            if (currentInputStr.includes('/') || currentInputStr === "" || currentInputStr.includes('%')) return;
            currentInputStr += '/';
        } else if (value === '.') {
            let lastSeg = currentInputStr.includes('/') ? currentInputStr.split('/').pop() : currentInputStr;
            if (lastSeg.includes('.')) return;
            if (currentInputStr === "") currentInputStr = "0";
            currentInputStr += '.';
        } else {
            if (currentInputStr.includes('%')) return;
            if (currentInputStr === "0" && !currentInputStr.includes('.')) currentInputStr = value;
            else currentInputStr += value;
        }
        updateInputDisplay();
    }
    function deleteLastChar() { if (currentInputStr !== "") { currentInputStr = currentInputStr.slice(0, -1); updateInputDisplay(); } }
    function clearInput() { currentInputStr = ""; updateInputDisplay(); }

    function pickRandomQuestion() { return { ...questions[Math.floor(Math.random() * TOTAL_QS)] }; }
    function randomQuestionType() { return Math.random() < 0.5 ? 'f2p' : 'p2f'; }

    function loadNewQuestion() {
        currentQuestion = pickRandomQuestion();
        currentQuestionType = randomQuestionType();
        answeredForCurrent = false; currentLock = false; clearInput();
        if (currentQuestionType === 'f2p') {
            qEl.innerHTML = `${currentQuestion.分数} <span>= ?</span>`;
            hintEl.innerHTML = `📂 分组 · ${currentQuestion.分组} ｜ 输入百分数`;
        } else {
            qEl.innerHTML = `${currentQuestion.百分数} <span>= ?</span>`;
            hintEl.innerHTML = `📂 分组 · ${currentQuestion.分组} ｜ 输入分数`;
        }
    }

    function checkAndShowDialog() {
        if (!currentQuestion) { loadNewQuestion(); return; }
        if (answeredForCurrent) {
            showResultWindow('info', '已经核对过了', '本题已核对，试试下一题吧~', '', '');
            return;
        }
        let userAnswerRaw = currentInputStr.trim();
        if (userAnswerRaw === "") {
            let hint = currentQuestionType === 'f2p' ? '请输入百分数 (如 6.25)' : '请输入分数 (如 1/8)';
            showResultWindow('warn', '请输入答案', hint, '', '');
            return;
        }
        let isCorrect = false, displayUser = userAnswerRaw, displayCorrect = '';
        if (currentQuestionType === 'f2p') {
            let finalUserInput = userAnswerRaw.includes('%') ? userAnswerRaw : userAnswerRaw + '%';
            displayUser = finalUserInput; displayCorrect = currentQuestion.百分数;
            isCorrect = isAnswerCorrectWithTolerance(finalUserInput, currentQuestion.百分数);
        } else {
            displayUser = userAnswerRaw; displayCorrect = currentQuestion.分数;
            isCorrect = checkFractionAnswer(userAnswerRaw, currentQuestion.百分数);
        }
        if (!answeredForCurrent && !currentLock) {
            answeredForCurrent = true; currentLock = true;
            stats.totalAttempts += 1;
            if (isCorrect) stats.correctCount += 1;
            updateStatsUI(); saveStats();
        }
        showResultWindow(isCorrect?'success':'error', isCorrect?'回答正确':'回答错误', isCorrect?'很棒！继续巩固':'记背一下，下次答对~', displayUser, displayCorrect);
        if (isCorrect) fireConfetti();
        setTimeout(() => { loadNewQuestion(); }, isCorrect ? 800 : 1500);
    }

    function skipAndNext() { loadNewQuestion(); }

    function renderBackTable() {
        tableBody.innerHTML = '';
        questions.forEach(item => {
            let row = tableBody.insertRow();
            row.insertCell(0).innerText = item.分数;
            row.insertCell(1).innerText = item.百分数;
            row.insertCell(2).innerHTML = `<span class="group-badge">${item.分组}</span>`;
        });
        backTotalEl.innerText = questions.length;
    }

    function toggleFlip() { flipContainer.classList.toggle('flipped'); }

    function initBF() {
        loadStats(); renderBackTable();
        metaEl.innerText = `📌 覆盖${TOTAL_QS}道 · 百化分核心表`;
        loadNewQuestion();

        document.querySelectorAll('#section-baifen .num-btn[data-value]').forEach(btn => {
            btn.addEventListener('click', () => { let v = btn.getAttribute('data-value'); if (v) appendToInput(v); });
        });
        document.getElementById('bfDel').addEventListener('click', deleteLastChar);
        document.getElementById('bfClear').addEventListener('click', clearInput);
        document.getElementById('bfPercent').addEventListener('click', () => appendToInput('%'));
        document.getElementById('bfSlash').addEventListener('click', () => appendToInput('/'));
        document.getElementById('bfConfirm').addEventListener('click', checkAndShowDialog);
        document.getElementById('bfSkip').addEventListener('click', skipAndNext);
        document.getElementById('bfReset').addEventListener('click', resetStats);
        document.getElementById('bfFlipBtn').addEventListener('click', toggleFlip);
        document.getElementById('bfFlipBackBtn').addEventListener('click', toggleFlip);
    }
    initBF();
})();

// ==================== 词语记忆模块 ====================
(function() {
    if (typeof WORDS_DATA === 'undefined') { console.error('WORDS_DATA not loaded'); return; }

    let allWords = [];
    // 合并成语和实词，标记类型
    WORDS_DATA.成语.forEach(e => allWords.push({ ...e, type: 'idiom' }));
    WORDS_DATA.实词.forEach(e => allWords.push({ ...e, type: 'word' }));

    let currentMode = 'all'; // 'all' | 'idiom' | 'word'
    let currentWord = null;
    let options = [];
    let answered = false;
    let wdStats = { totalAttempts: 0, correctCount: 0 };

    const wdWordEl = document.getElementById('wdWord'), wdGroupEl = document.getElementById('wdGroup');
    const wdTotalEl = document.getElementById('wdTotal'), wdCorrectEl = document.getElementById('wdCorrect'), wdAccEl = document.getElementById('wdAcc');
    const optionsGrid = document.getElementById('wdOptions');

    function getPool() {
        if (currentMode === 'idiom') return allWords.filter(w => w.type === 'idiom');
        if (currentMode === 'word') return allWords.filter(w => w.type === 'word');
        return allWords;
    }

    function updateWdStatsUI() {
        wdTotalEl.innerText = wdStats.totalAttempts;
        wdCorrectEl.innerText = wdStats.correctCount;
        let acc = wdStats.totalAttempts === 0 ? 0 : (wdStats.correctCount / wdStats.totalAttempts * 100);
        wdAccEl.innerText = Math.round(acc);
    }
    function saveWdStats() { localStorage.setItem('wd_stats', JSON.stringify(wdStats)); }
    function loadWdStats() {
        let saved = localStorage.getItem('wd_stats');
        if (saved) { try { let p = JSON.parse(saved); if (typeof p.totalAttempts === 'number') wdStats = p; } catch(e) {} }
        updateWdStatsUI();
    }
    function resetWdStats() {
        if (!confirm('确定要重置词语记忆统计吗？')) return;
        wdStats.totalAttempts = 0; wdStats.correctCount = 0; updateWdStatsUI(); saveWdStats();
    }

    function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function loadNewWord() {
        let pool = getPool();
        if (pool.length < 4) { wdWordEl.innerText = '数据不足'; return; }
        currentWord = pickRandom(pool);
        // 选3个错误选项
        let wrongPool = pool.filter(w => w.词 !== currentWord.词);
        let distractors = [];
        for (let i = 0; i < 3; i++) {
            if (wrongPool.length === 0) break;
            let idx = Math.floor(Math.random() * wrongPool.length);
            distractors.push(wrongPool[idx]);
            wrongPool.splice(idx, 1);
        }
        // 构建选项数组
        options = [currentWord, ...distractors];
        // 洗牌
        for (let i = options.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        answered = false;
        // 渲染
        wdWordEl.innerText = currentWord.词;
        let typeLabel = currentWord.type === 'idiom' ? '成语' : '实词';
        wdGroupEl.innerText = `${typeLabel} · ${currentWord.分组}`;
        let labels = ['A', 'B', 'C', 'D'];
        let btns = optionsGrid.querySelectorAll('.option-btn');
        btns.forEach((btn, i) => {
            btn.className = 'option-btn';
            btn.innerHTML = `<span class="option-num">${labels[i]}</span> ${options[i].解释}`;
            btn.onclick = () => onOptionClick(i);
        });
    }

    function onOptionClick(index) {
        if (answered) return;
        answered = true;
        let selected = options[index];
        let isCorrect = selected.词 === currentWord.词;
        // 高亮
        let btns = optionsGrid.querySelectorAll('.option-btn');
        btns.forEach((btn, i) => {
            btn.onclick = null;
            if (options[i].词 === currentWord.词) btn.classList.add('correct');
            else if (i === index && !isCorrect) btn.classList.add('wrong');
        });

        wdStats.totalAttempts += 1;
        if (isCorrect) wdStats.correctCount += 1;
        updateWdStatsUI(); saveWdStats();

        let shortCorrect = currentWord.解释.length > 40 ? currentWord.解释.slice(0, 40) + '...' : currentWord.解释;
        let shortUser = selected.解释.length > 40 ? selected.解释.slice(0, 40) + '...' : selected.解释;
        showResultWindow(isCorrect?'success':'error', isCorrect?'回答正确':'回答错误', '', shortUser, shortCorrect);
        if (isCorrect) fireConfetti();
        setTimeout(() => { loadNewWord(); }, isCorrect ? 800 : 1800);
    }

    // 模式切换
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
            loadNewWord();
        });
    });

    document.getElementById('wdSkip').addEventListener('click', () => { if (!answered) loadNewWord(); });
    document.getElementById('wdReset').addEventListener('click', resetWdStats);

    loadWdStats();
    loadNewWord();
})();
</script>
